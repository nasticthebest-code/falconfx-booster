services:
  - type: web
    name: falconfx-booster
    runtime: python
    plan: free
    buildCommand: "mkdir -p /tmp/cargo && CARGO_HOME=/tmp/cargo pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /booster/health
